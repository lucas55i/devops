apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx
  name: nginx
  namespace: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - image: nginx
          name: nginx
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: ALUNO
              value: "lucas"
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 80
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 80
